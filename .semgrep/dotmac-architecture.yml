rules:
  - id: db-query-usage
    pattern: $DB.query(...)
    message: >
      Use `select()` + `db.scalars()` (SQLAlchemy 2.0) instead of `db.query()`.
      See: https://docs.sqlalchemy.org/en/20/changelog/migration_20.html
    languages: [python]
    severity: WARNING
    paths:
      exclude:
        - "**/tests/"
        - "**/alembic/"
        - "**/scripts/"

  - id: async-route-handler
    patterns:
      - pattern: |
          @router.$METHOD(...)
          async def $FUNC(...):
              ...
    message: >
      Route handlers should be sync (`def`, not `async def`). SQLAlchemy sessions
      are sync. Use Celery for background work.
    languages: [python]
    severity: WARNING
    paths:
      include:
        - "**/app/web/"

  - id: service-raises-http-exception
    pattern: raise HTTPException(...)
    message: >
      Services should raise domain exceptions (ValueError, RuntimeError, NotFoundError),
      not HTTPException. Routes translate exceptions to HTTP responses.
    languages: [python]
    severity: WARNING
    paths:
      include:
        - "**/app/services/"
      exclude:
        - "**/app/services/*/web.py"
        - "**/app/services/*/web/*.py"

  - id: commit-in-service
    pattern: $DB.commit()
    message: >
      Services should use `db.flush()`, not `db.commit()`. The caller (route/task)
      controls the transaction boundary.
    languages: [python]
    severity: INFO
    paths:
      include:
        - "**/app/services/"
      exclude:
        - "**/app/services/scheduler_config.py"
        - "**/tests/"

  - id: tasks-must-use-session-for-org
    pattern: SessionLocal()
    message: >
      Celery tasks must NOT open a bare `SessionLocal()`. Use the canonical
      dual-layer helpers from `app.db.session_context` so tenant context is
      set at both the ORM listener AND the PostgreSQL RLS layer:

        with session_for_org(org_id) as db:    # single tenant work
            ...

        with cross_org_session() as db:         # cross-tenant batch listing
            ...

      Bare `SessionLocal()` leaves the session unscoped — RLS-protected
      queries silently return zero rows and the task completes "successfully"
      with no data. This is the bug class that produced the 2026-05-16
      banking auto-match outage.

      If a task genuinely needs an unscoped session (global maintenance,
      cross-tenant cleanup that does NOT query org-scoped tables), opt out
      with a per-line annotation that includes a reason:

        SessionLocal()  # nosemgrep: tasks-must-use-session-for-org -- <reason>

      Every allowlist entry MUST explain why bypassing the contract is safe.
    languages: [python]
    severity: ERROR
    paths:
      include:
        - "**/app/tasks/"
