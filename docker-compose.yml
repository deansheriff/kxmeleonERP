services:
  app:
    image: ghcr.io/michaelayoade/dotmac_erp:latest
    platform: linux/amd64
    container_name: dotmac_erp_app
    restart: unless-stopped
    ports:
    - "8003:8002"
    env_file:
    - .env
    environment:
      APP_URL: https://erp.dotmac.io
      APP_VERSION: ${APP_VERSION:-1.4.0}
      DEFAULT_ORGANIZATION_ID: 00000000-0000-0000-0000-000000000001
      TRUSTED_PROXY_IPS: 172.16.0.0/12,127.0.0.1
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CSP_ALLOW_UNSAFE: 'true'
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-devtoken}
      OPENBAO_ALLOW_INSECURE: 'true'
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-erp}
      GUNICORN_WORKERS: '4'
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONPYCACHEPREFIX: /tmp/pycache
    depends_on:
      redis:
        condition: service_started
    volumes:
    - dotmac_logs:/var/log/dotmac
    - ./static:/app/static:ro
    - ./templates:/app/templates:ro
    - ./app:/app/app:ro
    - ./license:/app/license:ro
    - ./gunicorn.conf.py:/app/gunicorn.conf.py:ro
    - ./scripts/entrypoint-monitoring.sh:/app/entrypoint-monitoring.sh:ro
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8002/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    entrypoint:
    - /app/entrypoint-monitoring.sh
    command:
    - gunicorn
    - -c
    - gunicorn.conf.py
    - app.main:app
  app-dev:
    build: .
    platform: linux/amd64
    container_name: dotmac_erp_app_dev
    restart: unless-stopped
    profiles:
    - dev
    ports:
    - 8002:8002
    env_file:
    - .env
    environment:
      APP_URL: https://erp.dotmac.io
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-devtoken}
      OPENBAO_ALLOW_INSECURE: 'true'
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-erp}
    depends_on:
      redis:
        condition: service_started
    volumes:
    - .:/app
    command:
    - uvicorn
    - app.main:app
    - --host
    - 0.0.0.0
    - --port
    - '8002'
  worker:
    build: .
    platform: linux/amd64
    container_name: dotmac_erp_worker
    restart: unless-stopped
    env_file:
    - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-devtoken}
      OPENBAO_ALLOW_INSECURE: 'true'
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-erp}
    depends_on:
      redis:
        condition: service_started
    volumes:
    - ./app:/app/app:ro
    - ./scripts/entrypoint-monitoring.sh:/app/entrypoint-monitoring.sh:ro
    entrypoint:
    - /app/entrypoint-monitoring.sh
    command:
    - celery
    - -A
    - app.celery_app
    - worker
    - -l
    - info
  beat:
    build: .
    platform: linux/amd64
    container_name: dotmac_erp_beat
    restart: unless-stopped
    env_file:
    - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-devtoken}
      OPENBAO_ALLOW_INSECURE: 'true'
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-erp}
    depends_on:
      redis:
        condition: service_started
    volumes:
    - ./app:/app/app:ro
    - ./scripts/entrypoint-monitoring.sh:/app/entrypoint-monitoring.sh:ro
    entrypoint:
    - /app/entrypoint-monitoring.sh
    command:
    - celery
    - -A
    - app.celery_app
    - beat
    - -l
    - info
  redis:
    image: redis:7
    platform: linux/amd64
    container_name: dotmac_erp_redis
    restart: unless-stopped
    command:
    - redis-server
    - --requirepass
    - ${REDIS_PASSWORD:-redis}
    ports:
    - 127.0.0.1:6382:6379
volumes:
  dotmac_erp_db_data: null
  dotmac_logs: null
